<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 10 10" width="10" height="10">
    <defs>
        <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur in="SourceGraphic" stdDeviation="0.4" result="blur"/>
            <feMerge>
                <feMergeNode in="blur"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
    </defs>
    <g filter="url(#soft)">
        <line x1="0" y1="0" x2="10" y2="10" stroke="currentColor" stroke-width="1" stroke-linecap="butt"/>
        <line x1="10" y1="0" x2="0" y2="10" stroke="currentColor" stroke-width="1" stroke-linecap="butt"/>
    </g>
</svg>